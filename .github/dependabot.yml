# Dependabot configuration for automated action SHA updates.
# SLSA L3 requires pinning actions to commit SHAs; Dependabot
# keeps those pins current when new versions are released.
#
# See: https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps):"
    labels:
      - "dependencies"
    groups:
      # Group all action updates into a single PR to reduce noise.
      actions:
        patterns:
          - "*"
