# ══════════════════════════════════════════════════════════════════════
# ReleaseKit: Automated Release Pipeline — Python (uv)
# ══════════════════════════════════════════════════════════════════════
#
# This workflow implements a release-please-style pipeline for the
# genkit Python SDK. It uses releasekit to automate:
#
#   1. PREPARE  — compute version bumps, generate changelogs, open
#                 or update a Release PR.
#   2. RELEASE  — tag the merge commit, create a GitHub Release.
#   3. PUBLISH  — build and publish packages to PyPI in topological
#                 order with retry and ephemeral version pinning.
#
# ── Automatic Flow ──────────────────────────────────────────────────
#
#   push to main ──► releasekit prepare ──► Release PR
#   (py/packages/**                          (autorelease: pending)
#    py/plugins/**)                                │
#                                             merge PR
#                                                  │
#                                                  ▼
#                                        releasekit release ──► tags + GitHub Release
#                                                  │
#                                                  ▼
#                                        releasekit publish ──► PyPI
#                                           │            │
#                                           │    upload manifest artifact
#                                           │            │
#                                           ▼            ▼
#                              releasekit verify-install  │
#                              (from manifest artifact)   │
#                                           │             │
#                                           ▼             │
#                                  repository_dispatch ◄──┘
#                                           │
#                                           ▼
#                                     downstream repos
#
# ── Manual Dispatch Flow ────────────────────────────────────────────
#
#   ┌──────────────────────────────────────────────────────────────────┐
#   │  workflow_dispatch UI                                            │
#   │                                                                  │
#   │  action:  [prepare ▼]  ──► runs PREPARE job only                 │
#   │           [release ▼]  ──► runs RELEASE + PUBLISH + VERIFY +     │
#   │                            NOTIFY                                │
#   │                                                                  │
#   │  target:              [pypi / testpypi]                          │
#   │  dry_run:             [✓] simulate, no side effects              │
#   │  force_prepare:       [✓] skip preflight, force PR creation      │
#   │  group:               [________] target a release group          │
#   │  bump_type:           [auto / patch / minor / major]             │
#   │  prerelease:          [________] e.g. rc.1, beta.1               │
#   │  skip_publish:        [✓] tag + release but don't publish        │
#   │  concurrency:         [0] max parallel publish (0 = auto)        │
#   │  pypi_environment:    [pypi_github_publishing] OIDC env name     │
#   │  testpypi_environment:[testpypi] OIDC env name for TestPyPI      │
#   └──────────────────────────────────────────────────────────────────┘
#
# ── Job Dependency Graph ───────────────────────────────────────────
#
#   ┌───────┐
#   │ auth  │  Resolve token: App → PAT → GITHUB_TOKEN
#   └───┬───┘
#       │ outputs: token, auth-method, git-user-name, git-user-email
#       │
#       ├──────────────────────┐
#       │                      │
#       ▼                      ▼
#   ┌─────────┐          ┌─────────┐
#   │ prepare │          │ release │
#   │ (push)  │          │ (merge) │
#   └─────────┘          └────┬────┘
#                             │ needs: [auth]
#                             │ if: release.result == 'success'
#                             ▼
#                        ┌─────────┐
#                        │ publish │  ──► uploads manifest artifact
#                        │ (PyPI)  │
#                        └────┬────┘
#                             │ needs: [auth, release]
#                             │
#                             ▼
#                        ┌────────┐
#                        │ verify │  releasekit verify-install
#                        └────┬───┘  (downloads manifest artifact)
#                             │ needs: [publish]
#                             │
#                             ▼
#                        ┌────────┐
#                        │ notify │  if: !cancelled() && publish == success
#                        └────────┘  (verify failure does NOT block notify)
#                          needs: [auth, release, publish, verify]
#
# ── Token Resolution (Sentinel Pattern) ───────────────────────────
#
#   The auth job resolves a token and outputs it for downstream jobs.
#   Because secrets.GITHUB_TOKEN cannot cross job boundaries, the auth
#   job outputs the literal string "GITHUB_TOKEN" as a sentinel when
#   falling back to the built-in token.
#
#   auth job                          downstream job
#   ────────                          ──────────────
#   App token available?
#     yes ──► output real token  ──►  use token directly
#     no  ──► PAT available?
#               yes ──► output PAT ─► use token directly
#               no  ──► output       ┌─────────────────────────────┐
#                       "GITHUB_TOKEN"│ RESOLVED_TOKEN =            │
#                       (sentinel)   │   auth-method == 'github-   │
#                                    │   token' ? secrets.GITHUB_  │
#                                    │   TOKEN : needs.auth.token  │
#                                    └─────────────────────────────┘
#
# ── Trigger Matrix ──────────────────────────────────────────────────
#
#   Event              │ Jobs that run
#   ───────────────────┼──────────────────────────────────────────
#   push to main       │ prepare
#   PR merged          │ release → publish → verify → notify
#   dispatch: prepare  │ prepare
#   dispatch: release  │ release → publish → verify → notify
#
# ── Inputs Reference ────────────────────────────────────────────────
#
#   Input               │ Type    │ Default                │ Description
#   ────────────────────┼─────────┼────────────────────────┼──────────────────────────
#   action              │ choice  │ release                │ Pipeline stage: prepare or release
#   target              │ choice  │ pypi                   │ Registry: pypi or testpypi
#   dry_run             │ boolean │ true                   │ Simulate without side effects
#   force_prepare       │ boolean │ false                  │ Force PR creation (--force)
#   group               │ string  │ (all)                  │ Target a specific release group
#   bump_type           │ choice  │ auto                   │ Override semver bump detection
#   prerelease          │ string  │ (none)                 │ Prerelease suffix (e.g. rc.1)
#   skip_publish        │ boolean │ false                  │ Tag + release, skip registry
#   concurrency         │ string  │ 0                      │ Max parallel publish jobs
#   max_retries         │ string  │ 2                      │ Retry failed publishes (0 = off)
#   no_ai               │ boolean │ false                  │ Disable AI features
#   model               │ string  │ (chain)                │ Override AI model
#   codename_theme      │ string  │ (cfg)                  │ Override codename theme
#   pypi_environment    │ string  │ pypi_github_publishing │ GitHub env for PyPI OIDC
#   testpypi_environment│ string  │ testpypi               │ GitHub env for TestPyPI OIDC
#   auth_method         │ choice  │ auto                   │ Auth: auto, app, pat, github-token
#
# ── Job Permissions (Least Privilege) ─────────────────────────────
#
#   Job        │ contents │ pull-requests │ id-token │ attestations │ actions │ Reason
#   ───────────┼──────────┼───────────────┼──────────┼──────────────┼─────────┼──────────────────────────
#   auth       │ (none)   │ (none)        │ (none)   │ (none)       │ (none)  │ Uses own generated token
#   prepare    │ write    │ write         │ (none)   │ (none)       │ (none)  │ Push commits, create PRs
#   release    │ write    │ (none)        │ (none)   │ (none)       │ (none)  │ Create tags + GitHub Releases
#   build      │ read     │ (none)        │ write    │ write        │ (none)  │ Build only (no PyPI creds)
#   provenance │ write    │ (none)        │ write    │ (none)       │ read    │ SLSA L3 (reusable workflow)
#   upload     │ read     │ (none)        │ write    │ (none)       │ (none)  │ Upload attested artifacts
#   verify     │ read     │ (none)        │ (none)   │ (none)       │ (none)  │ Checkout + SLSA verification
#   notify     │ (none)   │ (none)        │ (none)   │ (none)       │ (none)  │ Uses own token for dispatch
#
# Workflow-level: permissions: {} (all grants are per-job)
# All third-party actions pinned to commit SHAs (SLSA L3 requirement)
#
# ── SLSA Build L3 Compliance ────────────────────────────────────────
#
# This workflow satisfies SLSA Build Level 3. The table below maps
# each L3 requirement to the specific mechanism used.
#
#   Requirement              │ Mechanism                     │ Job(s)
#   ─────────────────────────┼───────────────────────────────┼──────────────
#   Hardened build platform  │ GitHub-hosted ubuntu-latest   │ build
#   Build/upload isolation   │ Separate build + upload jobs  │ build, upload
#   Non-falsifiable prov.    │ slsa-github-generator (L3)    │ provenance
#   Hermetic build           │ --build-only (no registry I/O)│ build
#   Pinned dependencies      │ All actions pinned to SHA     │ all
#   Ephemeral environment    │ Fresh VM per job run          │ all
#   OIDC identity            │ id-token: write (Sigstore)    │ build, upload
#   Provenance before upload │ provenance runs before upload │ provenance
#   Verification             │ slsa-verifier in verify job   │ verify
#
# Data flow:
#
#   release --> build --[artifacts]--> provenance --[attested]--> upload
#                 |                       |                         |
#                 +-- digests (base64) ---+                        |
#                 +-- manifest, SBOMs, attestations                |
#                                                          verify <-+
#
# References:
#   - SLSA framework:           https://slsa.dev/
#   - SLSA Build L3 spec:       https://slsa.dev/spec/v1.0/levels#build-l3
#   - SLSA verification:        https://slsa.dev/spec/v1.0/verifying-artifacts
#   - slsa-github-generator:    https://github.com/slsa-framework/slsa-github-generator
#   - slsa-verifier:            https://github.com/slsa-framework/slsa-verifier
#   - Sigstore:                 https://www.sigstore.dev/
#   - in-toto attestation:      https://in-toto.io/
#   - GitHub attestations:      https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations
#   - GitHub Actions hardening: https://docs.github.com/en/actions/security-for-github-actions/security-hardening-for-github-actions
#
# ── Required Configuration ─────────────────────────────────────────
#
#   Repository Variables (Settings → Variables → Actions):
#
#     RELEASEKIT_APP_ID        — GitHub App ID (for App-based auth)
#     RELEASEKIT_GIT_USER_NAME — Git committer name for CLA-signed
#                                identity (used with PAT/GITHUB_TOKEN)
#     RELEASEKIT_GIT_USER_EMAIL— Git committer email for CLA-signed
#                                identity (used with PAT/GITHUB_TOKEN)
#
#   Repository Secrets (Settings → Secrets → Actions):
#
#     RELEASEKIT_APP_PRIVATE_KEY — GitHub App private key (PEM)
#     RELEASEKIT_TOKEN           — PAT fallback (if no App configured)
#     GEMINI_API_KEY             — Gemini API key (for AI features)
#
#   If neither RELEASEKIT_APP_ID nor RELEASEKIT_TOKEN is set, the
#   workflow falls back to GITHUB_TOKEN. In that case, set
#   RELEASEKIT_GIT_USER_NAME and RELEASEKIT_GIT_USER_EMAIL to use
#   a CLA-signed identity (otherwise PRs may fail CLA checks).
#
# ── Idempotency & Resumability ─────────────────────────────────────
#
#   Every job is idempotent — re-running a failed workflow is safe:
#
#     auth     Stateless; always resolves a fresh token.
#     prepare  Updates the existing Release PR instead of duplicating.
#     release  Skips tags and GitHub Releases that already exist.
#     publish  Skips versions already present on the registry.
#     verify   Re-verifies; always safe to repeat.
#     notify   Dispatches repository_dispatch (downstream deduplicates).
#
#   To resume after a failure, use "Re-run failed jobs" in the GitHub
#   Actions UI. Only the failed jobs re-run; successful jobs keep their
#   outputs. No special flags or state files are needed.
#
# ══════════════════════════════════════════════════════════════════════

name: "ReleaseKit: Python (uv)"

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Which pipeline stage to run'
        required: true
        default: release
        type: choice
        options:
          - prepare
          - release
      target:
        description: 'Publish target registry (release only)'
        required: true
        default: pypi
        type: choice
        options:
          - testpypi
          - pypi
      dry_run:
        description: 'Dry run — log what would happen without creating tags or publishing'
        required: true
        default: true
        type: boolean
      force_prepare:
        description: 'Force create/update the Release PR even if no new bumps are detected'
        required: false
        default: false
        type: boolean
      group:
        description: 'Release group to target (leave empty for all)'
        required: false
        type: string
      bump_type:
        description: 'Override auto-detected bump type'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      prerelease:
        description: 'Publish as prerelease (e.g. rc.1, beta.1)'
        required: false
        type: string
      skip_publish:
        description: 'Tag and create GitHub Release but skip publishing to registry'
        required: false
        default: false
        type: boolean
      concurrency:
        description: 'Max parallel publish jobs (0 = auto)'
        required: false
        default: '0'
        type: string
      max_retries:
        description: 'Max retries for failed publish attempts (0 = no retries)'
        required: false
        default: '2'
        type: string
      no_ai:
        description: 'Disable all AI features (summarization, codenames)'
        required: false
        default: false
        type: boolean
      model:
        description: 'Override AI model (e.g. ollama/gemma3:12b)'
        required: false
        type: string
      codename_theme:
        description: 'Override codename theme (e.g. galaxies, animals)'
        required: false
        type: string
      pypi_environment:
        description: 'GitHub environment name for PyPI OIDC trusted publishing'
        required: false
        default: pypi_github_publishing
        type: string
      testpypi_environment:
        description: 'GitHub environment name for TestPyPI OIDC trusted publishing'
        required: false
        default: testpypi
        type: string
      auth_method:
        description: 'Authentication method (auto = detect from configured secrets)'
        required: false
        default: auto
        type: choice
        options:
          - auto
          - app
          - pat
          - github-token
  push:
    branches: [main]
    paths:
      - "py/packages/**"
      - "py/plugins/**"
  pull_request:
    types: [closed]
    branches: [main]

# Only one release pipeline runs at a time.
concurrency:
  group: releasekit-${{ github.ref }}
  cancel-in-progress: false

# SLSA L3: Workflow-level permissions are empty; each job declares its own.
permissions: {}

env:
  RELEASEKIT_DIR: py/tools/releasekit
  WORKSPACE_DIR: py
  # Registry URLs resolved from the target input (defaults to prod PyPI).
  PUBLISH_INDEX_URL: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}
  PUBLISH_CHECK_URL: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/simple/' || 'https://pypi.org/simple/' }}
  # Dry-run logic:
  #   - PR merge (pull_request closed): dry_run=false (this is the one-button release flow)
  #   - Manual dispatch: uses the checkbox value (default: true)
  #   - Push to main: dry_run is not relevant (only runs prepare, which is always live)
  DRY_RUN: ${{ github.event_name == 'pull_request' && 'false' || (inputs.dry_run && 'true' || 'false') }}

jobs:
  # ═══════════════════════════════════════════════════════════════════════
  # AUTH: Resolve token (GitHub App → PAT → GITHUB_TOKEN)
  #
  # Supports three auth modes in priority order:
  #   1. GitHub App  — set RELEASEKIT_APP_ID (variable) +
  #                    RELEASEKIT_APP_PRIVATE_KEY (secret).
  #                    Passes CLA, triggers CI on Release PRs.
  #   2. PAT         — set RELEASEKIT_TOKEN (secret).
  #                    Passes CLA, triggers CI on Release PRs.
  #   3. GITHUB_TOKEN — built-in, no setup needed.
  #                    PRs will NOT trigger CI and may fail CLA checks.
  # ═══════════════════════════════════════════════════════════════════════
  auth:
    name: Resolve Auth Token
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    outputs:
      # When the fallback is GITHUB_TOKEN, we output the literal string
      # "GITHUB_TOKEN" as a sentinel because the actual secret cannot
      # cross job boundaries.  Downstream jobs must substitute their own
      # secrets.GITHUB_TOKEN when they see this sentinel.
      token: ${{ steps.resolve.outputs.token }}
      auth-method: ${{ steps.resolve.outputs.auth-method }}
      git-user-name: ${{ steps.resolve.outputs.git-user-name }}
      git-user-email: ${{ steps.resolve.outputs.git-user-email }}
    steps:
      # Option 1: GitHub App (preferred — passes CLA, triggers CI).
      - name: Generate GitHub App token
        if: >
          (inputs.auth_method == 'auto' || inputs.auth_method == 'app' || inputs.auth_method == '')
          && vars.RELEASEKIT_APP_ID != ''
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf  # v2
        with:
          app-id: ${{ vars.RELEASEKIT_APP_ID }}
          private-key: ${{ secrets.RELEASEKIT_APP_PRIVATE_KEY }}

      - name: Get App bot user ID
        if: steps.app-token.outcome == 'success'
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          if ! user_id=$(gh api "/users/${APP_SLUG}[bot]" --jq .id 2>/dev/null); then
            echo "::warning::Failed to fetch App bot user ID — using 0 as fallback"
            user_id=0
          fi
          echo "user-id=$user_id" >> "$GITHUB_OUTPUT"

      # Resolve: App > PAT > GITHUB_TOKEN (respects auth_method override).
      # SECURITY: All step outputs and inputs are passed via env vars
      # to prevent script injection attacks.
      - name: Resolve token and identity
        id: resolve
        env:
          AUTH_METHOD: ${{ inputs.auth_method || 'auto' }}
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          APP_USER_ID: ${{ steps.app-user.outputs.user-id }}
          PAT_TOKEN: ${{ secrets.RELEASEKIT_TOKEN }}
          GIT_USER_NAME: ${{ vars.RELEASEKIT_GIT_USER_NAME }}
          GIT_USER_EMAIL: ${{ vars.RELEASEKIT_GIT_USER_EMAIL }}
        run: |
          # App token — used when auth=auto (and available) or auth=app.
          if [ "$AUTH_METHOD" = "app" ] || { [ "$AUTH_METHOD" = "auto" ] && [ -n "$APP_TOKEN" ]; }; then
            { echo "token=$APP_TOKEN"
              echo "auth-method=app"
              echo "git-user-name=${APP_SLUG}[bot]"
              echo "git-user-email=${APP_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Using GitHub App token ($APP_SLUG)"

          # PAT — used when auth=auto (and available) or auth=pat.
          elif [ "$AUTH_METHOD" = "pat" ] || { [ "$AUTH_METHOD" = "auto" ] && [ -n "$PAT_TOKEN" ]; }; then
            { echo "token=$PAT_TOKEN"
              echo "auth-method=pat"
              echo "git-user-name=${GIT_USER_NAME:-releasekit[bot]}"
              echo "git-user-email=${GIT_USER_EMAIL:-releasekit[bot]@users.noreply.github.com}"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Using Personal Access Token"

          # GITHUB_TOKEN — fallback or explicit. Uses repo variables for
          # git identity if set, so CLA can pass with a signed identity.
          # NOTE: We output the sentinel "GITHUB_TOKEN" instead of the
          # actual secret because secrets.GITHUB_TOKEN cannot be passed
          # across job boundaries via outputs.
          else
            { echo "token=GITHUB_TOKEN"
              echo "auth-method=github-token"
              echo "git-user-name=${GIT_USER_NAME:-github-actions[bot]}"
              echo "git-user-email=${GIT_USER_EMAIL:-github-actions[bot]@users.noreply.github.com}"
            } >> "$GITHUB_OUTPUT"
            if [ -n "$GIT_USER_NAME" ]; then
              echo "::notice::Using GITHUB_TOKEN with custom identity ($GIT_USER_NAME)"
            else
              echo "::warning::Using GITHUB_TOKEN — PRs will not trigger CI and may fail CLA checks. Set RELEASEKIT_GIT_USER_NAME and RELEASEKIT_GIT_USER_EMAIL repo variables to use a CLA-signed identity."
            fi
          fi

  # ═══════════════════════════════════════════════════════════════════════
  # PREPARE: Compute bumps and open/update Release PR
  # ═══════════════════════════════════════════════════════════════════════
  prepare:
    name: Prepare Release PR
    needs: auth
    if: |
      (github.event_name == 'push' &&
       !startsWith(github.event.head_commit.message, 'chore(release):') &&
       !contains(github.event.head_commit.message, 'releasekit--release')) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'prepare')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write      # Push version bump commits
      pull-requests: write  # Create/update Release PRs
    outputs:
      has_bumps: ${{ steps.prepare.outputs.has_bumps }}
      pr_url: ${{ steps.prepare.outputs.pr_url }}
    env:
      # Resolve the sentinel: use the job's own GITHUB_TOKEN when auth
      # fell back to the built-in token (it cannot cross job boundaries).
      RESOLVED_TOKEN: ${{ needs.auth.outputs.auth-method == 'github-token' && secrets.GITHUB_TOKEN || needs.auth.outputs.token }}
      GOOGLE_GENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      # Shallow checkout is needed so the runner can resolve
      # ./.github/actions/*. setup-releasekit re-checkouts with
      # fetch-depth: 0 and fetch-tags: true for full history.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: ./.github/actions/setup-releasekit
        with:
          token: ${{ env.RESOLVED_TOKEN }}
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          git-user-name: ${{ needs.auth.outputs.git-user-name }}
          git-user-email: ${{ needs.auth.outputs.git-user-email }}

      - uses: ./.github/actions/run-releasekit
        id: prepare
        with:
          command: prepare
          workspace: py
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          dry-run: ${{ inputs.dry_run && 'true' || 'false' }}
          group: ${{ inputs.group }}
          bump-type: ${{ inputs.bump_type }}
          prerelease: ${{ inputs.prerelease }}
          force: ${{ inputs.force_prepare && 'true' || 'false' }}
          no-ai: ${{ inputs.no_ai && 'true' || 'false' }}
          model: ${{ inputs.model }}
          codename-theme: ${{ inputs.codename_theme }}
        env:
          GH_TOKEN: ${{ env.RESOLVED_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  # RELEASE: Tag merge commit and create GitHub Release
  # ═══════════════════════════════════════════════════════════════════════
  release:
    name: Tag and Release
    needs: auth
    if: |
      (github.event_name == 'pull_request' &&
       github.event.pull_request.merged == true &&
       contains(github.event.pull_request.labels.*.name, 'autorelease: pending')) ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'release')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write      # Create tags and GitHub Releases
    outputs:
      release_url: ${{ steps.release.outputs.release_url }}
    env:
      RESOLVED_TOKEN: ${{ needs.auth.outputs.auth-method == 'github-token' && secrets.GITHUB_TOKEN || needs.auth.outputs.token }}
      GOOGLE_GENAI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: ./.github/actions/setup-releasekit
        with:
          token: ${{ env.RESOLVED_TOKEN }}
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          git-user-name: ${{ needs.auth.outputs.git-user-name }}
          git-user-email: ${{ needs.auth.outputs.git-user-email }}

      - uses: ./.github/actions/run-releasekit
        id: release
        with:
          command: release
          workspace: py
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          dry-run: ${{ env.DRY_RUN }}
          no-ai: ${{ inputs.no_ai && 'true' || 'false' }}
          model: ${{ inputs.model }}
          codename-theme: ${{ inputs.codename_theme }}
        env:
          GH_TOKEN: ${{ env.RESOLVED_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  # BUILD: Build artifacts in an isolated job (SLSA L3)
  #
  # This job ONLY builds -- it has NO access to PyPI credentials.
  # Artifacts are uploaded via actions/upload-artifact and attested
  # by the SLSA generator in a separate job BEFORE they reach PyPI.
  # This isolation is the key SLSA L3 requirement: the build job
  # cannot tamper with artifacts after they are attested.
  # ═══════════════════════════════════════════════════════════════════════
  build:
    name: Build Artifacts
    needs: [auth, release]
    if: ${{ !(inputs.skip_publish) && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write    # Sigstore signing of releasekit provenance
      attestations: write  # GitHub build attestations
      contents: read     # Required for actions/checkout
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
    env:
      RESOLVED_TOKEN: ${{ needs.auth.outputs.auth-method == 'github-token' && secrets.GITHUB_TOKEN || needs.auth.outputs.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: ./.github/actions/setup-releasekit
        with:
          token: ${{ env.RESOLVED_TOKEN }}
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          install-system-deps: "true"
          workspace-dir: ${{ env.WORKSPACE_DIR }}
          enable-ollama: "false"

      # Build only -- no registry upload. Artifacts land in
      # <workspace>/dist/<package>/*.whl and *.tar.gz.
      - uses: ./.github/actions/run-releasekit
        with:
          command: publish
          workspace: py
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          dry-run: ${{ env.DRY_RUN }}
          force: "true"
          group: ${{ inputs.group }}
          concurrency: ${{ inputs.concurrency }}
          no-ai: ${{ inputs.no_ai && 'true' || 'false' }}
          model: ${{ inputs.model }}
          codename-theme: ${{ inputs.codename_theme }}
          build-only: "true"

      - uses: ./.github/actions/compute-artifact-digests
        id: hash
        with:
          workspace-dir: ${{ env.WORKSPACE_DIR }}
          artifact-pattern: |
            *.whl
            *.tar.gz

      - uses: ./.github/actions/upload-release-artifacts
        with:
          workspace-dir: ${{ env.WORKSPACE_DIR }}
          upload-dist: "true"

      - uses: ./.github/actions/attest-build-artifacts
        with:
          subject-path: |
            ${{ env.WORKSPACE_DIR }}/dist/**/*.whl
            ${{ env.WORKSPACE_DIR }}/dist/**/*.tar.gz
          sbom-path: ${{ env.WORKSPACE_DIR }}/sbom.cdx.json
          has-digests: ${{ steps.hash.outputs.digests != '' && 'true' || 'false' }}

  # ═══════════════════════════════════════════════════════════════════════
  # PROVENANCE: SLSA L3 provenance via official generator
  #
  # This job calls the slsa-framework/slsa-github-generator reusable
  # workflow, which runs in a separate, tamper-proof execution context.
  # The provenance is generated by the reusable workflow's control plane,
  # NOT by the caller workflow -- this is the key L3 requirement.
  # The provenance attests the artifacts BEFORE they are uploaded to PyPI.
  # ═══════════════════════════════════════════════════════════════════════
  provenance:
    name: SLSA Provenance (L3)
    needs: build
    if: ${{ needs.build.outputs.digests != '' }}
    permissions:
      actions: read      # Read workflow run info for provenance
      id-token: write    # Sign provenance with Sigstore via OIDC
      contents: write    # Upload provenance as release asset
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.digests }}
      upload-assets: true

  # ═══════════════════════════════════════════════════════════════════════
  # UPLOAD: Push pre-built, attested artifacts to PyPI (SLSA L3)
  #
  # This job downloads the artifacts built by the build job and uploads
  # them to PyPI. It runs AFTER provenance generation, ensuring that
  # artifacts are attested before they reach the registry.
  # ═══════════════════════════════════════════════════════════════════════
  upload:
    name: Upload to ${{ inputs.target || 'pypi' }}
    needs: [auth, build, provenance]
    if: >-
      !cancelled() &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: ${{ inputs.target == 'testpypi' && (inputs.testpypi_environment || 'testpypi') || (inputs.pypi_environment || 'pypi_github_publishing') }}
    permissions:
      id-token: write    # Trusted publishing (OIDC)
      contents: read     # Required for actions/checkout
    env:
      RESOLVED_TOKEN: ${{ needs.auth.outputs.auth-method == 'github-token' && secrets.GITHUB_TOKEN || needs.auth.outputs.token }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: ./.github/actions/setup-releasekit
        with:
          token: ${{ env.RESOLVED_TOKEN }}
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          install-system-deps: "false"
          enable-ollama: "false"

      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: dist
          path: ${{ env.WORKSPACE_DIR }}/dist

      # Upload only -- no rebuild. Uses pre-built artifacts from the
      # build job, which have already been attested by the SLSA generator.
      - uses: ./.github/actions/run-releasekit
        with:
          command: publish
          workspace: py
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          dry-run: ${{ env.DRY_RUN }}
          force: "true"
          group: ${{ inputs.group }}
          concurrency: ${{ inputs.concurrency }}
          max-retries: ${{ inputs.max_retries }}
          check-url: ${{ env.PUBLISH_CHECK_URL }}
          index-url: ${{ env.PUBLISH_INDEX_URL }}
          no-ai: "true"
          upload-only: "true"
          dist-dir: ${{ env.WORKSPACE_DIR }}/dist
        env:
          UV_PUBLISH_TOKEN: ${{ inputs.target == 'testpypi' && secrets.TESTPYPI_TOKEN || secrets.PYPI_TOKEN }}

  # ═══════════════════════════════════════════════════════════════════════
  # VERIFY: Check published packages are installable
  # ═══════════════════════════════════════════════════════════════════════
  verify:
    name: Verify Published Packages
    needs: [upload, provenance]
    if: >-
      !cancelled() &&
      needs.upload.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - uses: ./.github/actions/setup-releasekit
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          enable-ollama: "false"

      - name: Download release manifest
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: release-manifest
          path: manifest

      - uses: ./.github/actions/verify-slsa-provenance
        with:
          provenance-name: ${{ needs.provenance.outputs.provenance-name }}
          provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}

      - name: Wait for PyPI propagation
        run: |
          echo "Waiting 60 seconds for PyPI CDN propagation..."
          sleep 60

      - name: Upgrade pip
        run: pip install --upgrade pip

      - uses: ./.github/actions/run-releasekit
        with:
          command: verify-install
          workspace: py
          releasekit-dir: ${{ env.RELEASEKIT_DIR }}
          manifest: manifest/release-manifest--py.json
          import-check: "from genkit.ai import Genkit"
          index-url: ${{ env.PUBLISH_CHECK_URL }}

  # ═══════════════════════════════════════════════════════════════════════
  # NOTIFY: Post-release notifications
  # ═══════════════════════════════════════════════════════════════════════
  notify:
    name: Notify Downstream
    needs: [auth, release, build, provenance, upload, verify]
    if: ${{ !cancelled() && needs.upload.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      - name: Dispatch release event
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0  # v3
        with:
          token: ${{ needs.auth.outputs.auth-method == 'github-token' && secrets.GITHUB_TOKEN || needs.auth.outputs.token }}
          event-type: genkit-python-release
          # SECURITY: Use toJSON() to safely escape the URL and prevent
          # JSON injection if release_url contains special characters.
          client-payload: ${{ format('{{"release_url":{0}}}', toJSON(needs.release.outputs.release_url)) }}
