# Publish all Python packages to PyPI.
#
# Triggered by pushing a tag like py/v0.7.0 or manually via workflow_dispatch.
# Auth uses PyPI trusted publishing (OIDC) — no API tokens needed.

name: Publish Python

on:
  push:
    tags:
      - "py/v*"
  workflow_dispatch:

concurrency:
  group: publish-python-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "0.6.6"

      - name: Build packages
        run: |
          set -euo pipefail

          PACKAGES=(
            py/packages/genkit
            py/plugins/anthropic
            py/plugins/compat-oai
            py/plugins/dev-local-vectorstore
            py/plugins/google-cloud
            py/plugins/google-genai
            py/plugins/ollama
            py/plugins/firebase
            py/plugins/flask
            py/plugins/vertex-ai
          )

          for pkg in "${PACKAGES[@]}"; do
            echo "::group::Build $pkg"
            uv build "$pkg" --out-dir dist/
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi_github_publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          skip-existing: true

  verify:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Smoke test
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#py/v}"
          pip install "genkit==${VERSION}"
          python -c "from genkit.ai import Genkit; print('ok')"
