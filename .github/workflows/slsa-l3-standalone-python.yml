# ══════════════════════════════════════════════════════════════════════
# Standalone SLSA Build L3 Release Pipeline
# ══════════════════════════════════════════════════════════════════════
#
# Builds, attests, and publishes all genkit Python packages with
# SLSA Build Level 3 compliance. No external tools required.
#
# How it works:
#
#   Job 1 (build)      -- Build all packages, compute SHA-256 digests,
#                          attest provenance, upload artifacts.
#   Job 2 (provenance) -- Generate SLSA provenance via slsa-github-generator.
#   Job 3 (upload)     -- Download pre-built artifacts, publish to PyPI.
#   Job 4 (verify)     -- Verify SLSA provenance + smoke-test install.
#   Job 5 (summary)    -- Write GITHUB_STEP_SUMMARY with results.
#
# Security properties:
#
#   - All ${{ }} expressions are in env: blocks, never in run: blocks.
#   - All third-party actions are pinned to commit SHAs.
#   - Each job has least-privilege permissions.
#   - Build job has NO registry credentials.
#   - Upload job has NO build tools.
#   - Provenance is generated by the CI platform (non-falsifiable).
#   - Artifact filenames with spaces are handled via null-delimited I/O.
#
# Packages published (topological order):
#
#   Level 0 (no internal deps):
#     genkit
#
#   Level 1 (depends on genkit):
#     genkit-plugin-anthropic
#     genkit-plugin-compat-oai
#     genkit-plugin-evaluators
#     genkit-plugin-fastapi
#     genkit-plugin-google-cloud
#     genkit-plugin-google-genai
#     genkit-plugin-ollama
#     genkit-plugin-xai
#
#   Level 2 (depends on genkit + level-1 plugin):
#     genkit-plugin-deepseek   (genkit + compat-oai)
#     genkit-plugin-flask      (genkit + google-genai)
#     genkit-plugin-vertex-ai  (genkit + compat-oai)
#
# ══════════════════════════════════════════════════════════════════════

name: Release (SLSA L3)

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run -- build and attest but do not publish
        type: boolean
        default: false
      target:
        description: Publish target registry
        type: choice
        default: pypi
        options:
          - pypi
          - testpypi

# Only one publish pipeline runs at a time.
concurrency:
  group: release-slsa-l3-${{ github.ref }}
  cancel-in-progress: false

# Top-level: no permissions. Each job declares its own.
permissions: {}

env:
  PYTHON_VERSION: "3.12"
  WORKSPACE_DIR: py
  # Glob patterns for artifacts (one per line).
  ARTIFACT_PATTERN: |
    *.whl
    *.tar.gz
  # Package directories in topological publish order.
  # Level 0: no internal deps.
  # Level 1: depends on genkit only.
  # Level 2: depends on genkit + a level-1 plugin.
  PACKAGES: |
    py/packages/genkit
    py/plugins/anthropic
    py/plugins/compat-oai
    py/plugins/evaluators
    py/plugins/fastapi
    py/plugins/google-cloud
    py/plugins/google-genai
    py/plugins/ollama
    py/plugins/xai
    py/plugins/deepseek
    py/plugins/flask
    py/plugins/vertex-ai

jobs:
  # ── Job 1: Build artifacts (no registry credentials) ───────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # for artifact attestation
      attestations: write   # for artifact attestation
    outputs:
      digests: ${{ steps.hash.outputs.digests }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libffi-dev

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1
        with:
          enable-cache: true

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build all packages
        env:
          PKG_LIST: ${{ env.PACKAGES }}
        run: |
          set -euo pipefail
          mkdir -p dist
          while IFS= read -r pkg_dir; do
            [ -z "$pkg_dir" ] && continue
            echo "::group::Building $pkg_dir"
            uv build "$pkg_dir" --out-dir dist
            echo "::endgroup::"
          done <<< "$PKG_LIST"
          echo "::group::All artifacts"
          ls -la dist/
          echo "::endgroup::"

      # ── Compute SHA-256 digests for slsa-github-generator ────────
      - name: Compute artifact digests
        id: hash
        env:
          ARTIFACT_PATTERN_INPUT: ${{ env.ARTIFACT_PATTERN }}
        run: |
          set -euo pipefail

          # Build find arguments from newline-separated patterns.
          FIND_ARGS=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            if [ ${#FIND_ARGS[@]} -gt 0 ]; then
              FIND_ARGS+=(-o)
            fi
            FIND_ARGS+=(-name "$pattern")
          done <<< "$ARTIFACT_PATTERN_INPUT"

          if [ ${#FIND_ARGS[@]} -gt 0 ]; then
            find dist/ -type f \( "${FIND_ARGS[@]}" \) -print0 | sort -z > /tmp/artifacts.list
          else
            true > /tmp/artifacts.list
          fi

          if [ ! -s /tmp/artifacts.list ]; then
            echo "::error::No artifacts found in dist/"
            exit 1
          fi

          echo "::group::Artifact digests"
          xargs -0 sha256sum < /tmp/artifacts.list | tee /tmp/checksums.txt
          echo "::endgroup::"

          echo "digests=$(base64 -w0 /tmp/checksums.txt)" >> "$GITHUB_OUTPUT"

      # ── Attest build provenance (GitHub artifact attestation) ────
      - name: Attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2  # v2.2.3
        with:
          subject-path: dist/*

      # ── Upload artifacts for downstream jobs ─────────────────────
      - name: Upload build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: build-artifacts
          path: dist/
          retention-days: 3

  # ── Job 2: Generate SLSA provenance ────────────────────────────────
  provenance:
    needs: [build]
    permissions:
      actions: read       # for reading workflow run
      id-token: write     # for signing provenance
      contents: write     # for uploading provenance as release asset
    # slsa-github-generator must be referenced by tag, not SHA.
    # See: https://github.com/slsa-framework/slsa-github-generator
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.build.outputs.digests }}
      upload-assets: true

  # ── Job 3: Upload to registry ──────────────────────────────────────
  upload:
    needs: [build, provenance]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write     # for trusted publishing (PyPI OIDC)
    environment:
      name: ${{ inputs.target == 'testpypi' && 'testpypi' || 'pypi' }}
    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: build-artifacts
          path: dist/

      - name: Publish to PyPI
        env:
          PUBLISH_URL: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}
        run: |
          set -euo pipefail
          echo "::group::Artifacts to publish"
          ls -la dist/
          echo "::endgroup::"

          if [ -n "$PUBLISH_URL" ]; then
            uv publish --publish-url "$PUBLISH_URL" dist/*
          else
            uv publish dist/*
          fi

  # ── Job 4: Verify provenance + smoke-test install ──────────────────
  verify:
    needs: [upload, provenance]
    if: inputs.dry_run != true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read       # for downloading provenance artifact
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@0c5e2b8115b80b4c7c5ddf6ffdd634974642d182  # v5.4.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Download provenance and artifacts ────────────────────────
      - name: Download provenance
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: provenance/

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: build-artifacts
          path: provenance/

      # ── Verify SLSA provenance ───────────────────────────────────
      - name: Install slsa-verifier
        uses: slsa-framework/slsa-verifier/actions/installer@6657aada084353c65e5dde35394b1a010289fab0  # v2.7.0

      - name: Verify SLSA provenance
        env:
          ARTIFACT_PATTERN_INPUT: ${{ env.ARTIFACT_PATTERN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "::group::SLSA provenance verification"

          PROVENANCE_FILE=$(find provenance/ -name '*.intoto.jsonl' | head -1)
          if [ -z "$PROVENANCE_FILE" ]; then
            echo "::error::No SLSA provenance file found"
            exit 1
          fi

          # Collect artifact files to verify.
          ARTIFACTS=()
          while IFS= read -r pattern; do
            [ -z "$pattern" ] && continue
            while IFS= read -r -d '' f; do
              ARTIFACTS+=("$f")
            done < <(find provenance/ -name "$pattern" ! -name '*.intoto.jsonl' -print0)
          done <<< "$ARTIFACT_PATTERN_INPUT"

          if [ ${#ARTIFACTS[@]} -eq 0 ]; then
            echo "::error::No artifacts found for verification"
            exit 1
          fi

          echo "Provenance: $PROVENANCE_FILE"
          echo "Source:     github.com/$REPO"
          echo "Artifacts:  ${ARTIFACTS[*]}"

          slsa-verifier verify-artifact \
            --provenance-path "$PROVENANCE_FILE" \
            --source-uri "github.com/$REPO" \
            "${ARTIFACTS[@]}"

          echo "::endgroup::"

      # ── Smoke-test: install from PyPI ────────────────────────────
      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Verify all packages install
        env:
          TAG: ${{ github.ref_name }}
          PKG_LIST: ${{ env.PACKAGES }}
          CHECK_URL: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/simple/' || '' }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          FAILED=0
          INDEX_ARGS=()
          if [ -n "$CHECK_URL" ]; then
            INDEX_ARGS=(--index-url "$CHECK_URL")
          fi

          while IFS= read -r pkg_dir; do
            [ -z "$pkg_dir" ] && continue
            PACKAGE=$(python3 -c 'import tomllib,pathlib,sys; data=tomllib.loads(pathlib.Path(sys.argv[1]+"/pyproject.toml").read_text()); print(data["project"]["name"])' "$pkg_dir")
            echo -n "Installing ${PACKAGE}==${VERSION}... "
            if uv pip install --system "${INDEX_ARGS[@]}" "${PACKAGE}==${VERSION}" 2>/dev/null; then
              echo "ok"
            else
              echo "FAILED"
              FAILED=$((FAILED + 1))
            fi
          done <<< "$PKG_LIST"

          if [ "$FAILED" -gt 0 ]; then
            echo "::warning::$FAILED package(s) failed to install"
          fi

          # Verify core import.
          python3 -c "from genkit.ai import Genkit; print('genkit imports ok')"

  # ── Job 5: Publish summary ────────────────────────────────────────
  summary:
    needs: [build, provenance, upload, verify]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create summary
        env:
          TAG: ${{ github.ref_name }}
          DRY_RUN: ${{ inputs.dry_run }}
          TARGET: ${{ inputs.target }}
          BUILD_RESULT: ${{ needs.build.result }}
          PROVENANCE_RESULT: ${{ needs.provenance.result }}
          UPLOAD_RESULT: ${{ needs.upload.result }}
          VERIFY_RESULT: ${{ needs.verify.result }}
          PKG_LIST: ${{ env.PACKAGES }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # Collect package names.
          NAMES=()
          while IFS= read -r pkg_dir; do
            [ -z "$pkg_dir" ] && continue
            name=$(python3 -c 'import tomllib,pathlib,sys; data=tomllib.loads(pathlib.Path(sys.argv[1]+"/pyproject.toml").read_text()); print(data["project"]["name"])' "$pkg_dir")
            NAMES+=("$name")
          done <<< "$PKG_LIST"

          {
            echo "## Release Summary"
            echo ""
            echo "**Version:** $VERSION"
            echo "**Target:** ${TARGET:-pypi}"
            echo "**Dry Run:** ${DRY_RUN:-false}"
            echo "**Packages:** ${#NAMES[@]}"
            echo ""

            if [ "$BUILD_RESULT" = "success" ]; then
              echo "- Build: passed"
            else
              echo "- Build: $BUILD_RESULT"
            fi

            if [ "$PROVENANCE_RESULT" = "success" ]; then
              echo "- Provenance: generated"
            else
              echo "- Provenance: $PROVENANCE_RESULT"
            fi

            if [ "$UPLOAD_RESULT" = "success" ]; then
              echo "- Upload: published"
            elif [ "$UPLOAD_RESULT" = "skipped" ]; then
              echo "- Upload: skipped (dry run)"
            else
              echo "- Upload: $UPLOAD_RESULT"
            fi

            if [ "$VERIFY_RESULT" = "success" ]; then
              echo "- Verify: passed"
            elif [ "$VERIFY_RESULT" = "skipped" ]; then
              echo "- Verify: skipped (dry run)"
            else
              echo "- Verify: $VERIFY_RESULT"
            fi

            echo ""
            echo "### Packages"
            echo ""
            for name in "${NAMES[@]}"; do
              echo "- [$name](https://pypi.org/project/$name/$VERSION/)"
            done

            echo ""
            echo "### Next Steps"
            echo "1. Verify on PyPI"
            echo "2. Test: \`pip install genkit==$VERSION\`"
          } >> "$GITHUB_STEP_SUMMARY"
