# ══════════════════════════════════════════════════════════════════════
# Reusable composite action: Run a releasekit command
#
# Builds the CLI invocation from structured inputs, runs it with
# proper error handling, and parses outputs into GITHUB_OUTPUT.
#
# Supports all three pipeline stages: prepare, release, publish.
# All user-controlled inputs are passed via env vars to prevent
# GitHub Actions script injection.
#
# Outputs:
#   has_bumps   — "true" if prepare found version bumps
#   pr_url      — URL of the created/updated Release PR
#   release_url — URL of the created GitHub Release
#
# ── SLSA Build L3 Support ──────────────────────────────────────────
#
# The publish command supports build/upload isolation for SLSA L3
# via three inputs:
#
#   Input       │ Flag          │ Purpose
#   ────────────┼───────────────┼──────────────────────────────────
#   build-only  │ --build-only  │ Build artifacts to dist/, skip upload
#   upload-only │ --upload-only │ Upload pre-built artifacts, skip build
#   dist-dir    │ --dist-dir    │ Path to pre-built artifacts
#
# Typical L3 workflow (3 separate jobs):
#
#   1. build job:  build-only=true   (produces dist/ + digests)
#   2. provenance: slsa-github-generator attests digests
#   3. upload job: upload-only=true, dist-dir=<downloaded artifacts>
#
# This ensures the SLSA generator's control plane attests artifacts
# BEFORE they reach the package registry.
#
# References:
#   - SLSA Build L3 spec:       https://slsa.dev/spec/v1.0/levels#build-l3
#   - SLSA isolation req.:      https://slsa.dev/spec/v1.0/requirements#build-l3
#   - slsa-github-generator:    https://github.com/slsa-framework/slsa-github-generator
#   - GitHub Actions security:  https://docs.github.com/en/actions/security-for-github-actions/security-hardening-for-github-actions
#   - GitHub script injection:  https://docs.github.com/en/actions/security-for-github-actions/security-hardening-for-github-actions/security-hardening-for-github-actions#understanding-the-risk-of-script-injections
#
# Usage (prepare -- all ecosystems):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: prepare
#       workspace: py           # or: js, go, rust, dart, java
#       releasekit-dir: tools/releasekit
#       group: ${{ inputs.group }}
#       force: ${{ inputs.force_prepare }}
#
# Usage (release -- all ecosystems):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: release
#       workspace: py           # or: js, go, rust, dart, java
#       releasekit-dir: tools/releasekit
#       dry-run: ${{ env.DRY_RUN }}
#
# Usage (build-only -- Python / uv, SLSA L3):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: py
#       releasekit-dir: tools/releasekit
#       build-only: "true"
#       force: "true"
#
# Usage (upload-only -- Python / uv, SLSA L3):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: py
#       releasekit-dir: tools/releasekit
#       upload-only: "true"
#       dist-dir: ${{ env.WORKSPACE_DIR }}/dist
#
# Usage (publish -- JavaScript / pnpm):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: js
#       releasekit-dir: tools/releasekit
#       force: "true"
#     env:
#       NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
#
# Usage (publish -- Rust / Cargo):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: rust
#       releasekit-dir: tools/releasekit
#       force: "true"
#     env:
#       CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
#
# Usage (publish -- Java / Gradle):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: java
#       releasekit-dir: tools/releasekit
#       force: "true"
#     env:
#       OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
#       OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}
#
# Usage (publish -- Go):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: go
#       releasekit-dir: tools/releasekit
#       force: "true"
#
# Usage (publish -- Dart / pub.dev):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: publish
#       workspace: dart
#       releasekit-dir: tools/releasekit
#       force: "true"
#
# Usage (verify-install -- Python / uv):
#
#   - uses: ./.github/actions/run-releasekit
#     with:
#       command: verify-install
#       workspace: py
#       releasekit-dir: tools/releasekit
#       manifest: manifest/release-manifest--py.json
#       import-check: "from genkit.ai import Genkit"
#
# ══════════════════════════════════════════════════════════════════════

name: Run ReleaseKit
description: >-
  Run a releasekit command (prepare, release, or publish) with
  structured inputs and parsed outputs.

inputs:
  command:
    description: >-
      The releasekit command to run: prepare, release, or publish.
    required: true
  workspace:
    description: >-
      Workspace label (e.g. "py", "js", "go").
    required: true
  releasekit-dir:
    description: >-
      Path to the releasekit tool directory (relative to repo root).
    required: false
    default: py/tools/releasekit
  dry-run:
    description: >-
      Set to "true" to pass --dry-run.
    required: false
    default: "false"
  force:
    description: >-
      Set to "true" to pass --force (prepare and publish).
    required: false
    default: "false"
  group:
    description: >-
      Release group to target (empty for all).
    required: false
    default: ""
  bump-type:
    description: >-
      Override bump type: auto, patch, minor, major (prepare only).
    required: false
    default: "auto"
  prerelease:
    description: >-
      Prerelease suffix, e.g. "rc.1" (prepare only).
    required: false
    default: ""
  concurrency:
    description: >-
      Max parallel publish jobs, 0 = auto (publish only).
    required: false
    default: "0"
  max-retries:
    description: >-
      Max retries for failed publishes (publish only).
    required: false
    default: "0"
  check-url:
    description: >-
      Registry URL for version existence checks (publish only).
    required: false
    default: ""
  index-url:
    description: >-
      Registry URL for uploading packages (publish only).
    required: false
    default: ""
  no-ai:
    description: >-
      Disable all AI features (summarization, codenames).
    required: false
    default: "false"
  model:
    description: >-
      Override AI model (e.g. "ollama/gemma3:12b", "gemini-pro").
    required: false
    default: ""
  codename-theme:
    description: >-
      Override codename theme (e.g. "galaxies", "animals").
    required: false
    default: ""
  tag:
    description: >-
      Git tag to roll back (rollback only).
    required: false
    default: ""
  all-tags:
    description: >-
      Delete ALL tags pointing to the same commit (rollback only).
    required: false
    default: "false"
  yank:
    description: >-
      Also yank/deprecate versions from the package registry (rollback only).
    required: false
    default: "false"
  yank-reason:
    description: >-
      Reason for yanking (rollback only).
    required: false
    default: ""
  manifest:
    description: >-
      Path to the release manifest JSON file (verify-install only).
    required: false
    default: ""
  import-check:
    description: >-
      Python import statement to verify after installing
      (e.g. "from genkit.ai import Genkit"). verify-install only.
    required: false
    default: ""
  ecosystem:
    description: >-
      Override ecosystem from manifest (python, js, cargo, etc.).
      verify-install only.
    required: false
    default: ""
  build-only:
    description: >-
      Build artifacts only, do not upload (SLSA L3 isolation).
      publish only.
    required: false
    default: "false"
  upload-only:
    description: >-
      Upload pre-built artifacts only, skip build (SLSA L3 isolation).
      publish only.
    required: false
    default: "false"
  dist-dir:
    description: >-
      Directory containing pre-built artifacts (used with upload-only).
      publish only.
    required: false
    default: ""

outputs:
  has_bumps:
    description: "'true' if prepare found version bumps."
    value: ${{ steps.run.outputs.has_bumps }}
  pr_url:
    description: URL of the Release PR (prepare only).
    value: ${{ steps.run.outputs.pr_url }}
  release_url:
    description: URL of the GitHub Release (release only).
    value: ${{ steps.run.outputs.release_url }}

runs:
  using: composite
  steps:
    # ── Build and run the command ───────────────────────────────────
    - name: Run releasekit ${{ inputs.command }}
      id: run
      shell: bash
      env:
        RELEASEKIT_COMMAND: ${{ inputs.command }}
        RELEASEKIT_WORKSPACE: ${{ inputs.workspace }}
        RELEASEKIT_DIR: ${{ inputs.releasekit-dir }}
        RELEASEKIT_DRY_RUN: ${{ inputs.dry-run }}
        RELEASEKIT_FORCE: ${{ inputs.force }}
        RELEASEKIT_GROUP: ${{ inputs.group }}
        RELEASEKIT_BUMP_TYPE: ${{ inputs.bump-type }}
        RELEASEKIT_PRERELEASE: ${{ inputs.prerelease }}
        RELEASEKIT_CONCURRENCY: ${{ inputs.concurrency }}
        RELEASEKIT_MAX_RETRIES: ${{ inputs.max-retries }}
        RELEASEKIT_CHECK_URL: ${{ inputs.check-url }}
        RELEASEKIT_INDEX_URL: ${{ inputs.index-url }}
        RELEASEKIT_NO_AI: ${{ inputs.no-ai }}
        RELEASEKIT_MODEL: ${{ inputs.model }}
        RELEASEKIT_CODENAME_THEME: ${{ inputs.codename-theme }}
        RELEASEKIT_TAG: ${{ inputs.tag }}
        RELEASEKIT_ALL_TAGS: ${{ inputs.all-tags }}
        RELEASEKIT_YANK: ${{ inputs.yank }}
        RELEASEKIT_YANK_REASON: ${{ inputs.yank-reason }}
        RELEASEKIT_MANIFEST: ${{ inputs.manifest }}
        RELEASEKIT_IMPORT_CHECK: ${{ inputs.import-check }}
        RELEASEKIT_ECOSYSTEM: ${{ inputs.ecosystem }}
        RELEASEKIT_BUILD_ONLY: ${{ inputs.build-only }}
        RELEASEKIT_UPLOAD_ONLY: ${{ inputs.upload-only }}
        RELEASEKIT_DIST_DIR: ${{ inputs.dist-dir }}
      run: |
        set -euo pipefail

        cmd=(uv run --directory "$RELEASEKIT_DIR" releasekit --workspace "$RELEASEKIT_WORKSPACE" "$RELEASEKIT_COMMAND")

        # ── Common flags ──────────────────────────────────────────
        if [ "$RELEASEKIT_DRY_RUN" = "true" ]; then
          cmd+=(--dry-run)
        fi
        if [ "$RELEASEKIT_FORCE" = "true" ]; then
          cmd+=(--force)
        fi
        if [ -n "$RELEASEKIT_GROUP" ]; then
          cmd+=(--group "$RELEASEKIT_GROUP")
        fi

        # ── prepare-specific flags ────────────────────────────────
        if [ "$RELEASEKIT_COMMAND" = "prepare" ]; then
          if [ "$RELEASEKIT_BUMP_TYPE" != "auto" ] && [ -n "$RELEASEKIT_BUMP_TYPE" ]; then
            cmd+=(--bump "$RELEASEKIT_BUMP_TYPE")
          fi
          if [ -n "$RELEASEKIT_PRERELEASE" ]; then
            cmd+=(--prerelease "$RELEASEKIT_PRERELEASE")
          fi
        fi

        # ── publish-specific flags ────────────────────────────────
        if [ "$RELEASEKIT_COMMAND" = "publish" ]; then
          if [ -n "$RELEASEKIT_CHECK_URL" ]; then
            cmd+=(--check-url "$RELEASEKIT_CHECK_URL")
          fi
          if [ -n "$RELEASEKIT_INDEX_URL" ]; then
            cmd+=(--index-url "$RELEASEKIT_INDEX_URL")
          fi
          if [ -n "$RELEASEKIT_CONCURRENCY" ] && [ "$RELEASEKIT_CONCURRENCY" != "0" ]; then
            cmd+=(--concurrency "$RELEASEKIT_CONCURRENCY")
          fi
          if [ -n "$RELEASEKIT_MAX_RETRIES" ] && [ "$RELEASEKIT_MAX_RETRIES" != "0" ]; then
            cmd+=(--max-retries "$RELEASEKIT_MAX_RETRIES")
          fi
          if [ "$RELEASEKIT_BUILD_ONLY" = "true" ]; then
            cmd+=(--build-only)
          fi
          if [ "$RELEASEKIT_UPLOAD_ONLY" = "true" ]; then
            cmd+=(--upload-only)
          fi
          if [ -n "$RELEASEKIT_DIST_DIR" ]; then
            cmd+=(--dist-dir "$RELEASEKIT_DIST_DIR")
          fi
        fi

        # ── AI flags ─────────────────────────────────────────────
        if [ "$RELEASEKIT_NO_AI" = "true" ]; then
          cmd+=(--no-ai)
        fi
        if [ -n "$RELEASEKIT_MODEL" ]; then
          cmd+=(--model "$RELEASEKIT_MODEL")
        fi
        if [ -n "$RELEASEKIT_CODENAME_THEME" ]; then
          cmd+=(--codename-theme "$RELEASEKIT_CODENAME_THEME")
        fi

        # ── verify-install-specific flags ──────────────────────
        if [ "$RELEASEKIT_COMMAND" = "verify-install" ]; then
          if [ -n "$RELEASEKIT_MANIFEST" ]; then
            cmd+=(--manifest "$RELEASEKIT_MANIFEST")
          fi
          if [ -n "$RELEASEKIT_IMPORT_CHECK" ]; then
            cmd+=(--import-check "$RELEASEKIT_IMPORT_CHECK")
          fi
          if [ -n "$RELEASEKIT_INDEX_URL" ]; then
            cmd+=(--index-url "$RELEASEKIT_INDEX_URL")
          fi
          if [ -n "$RELEASEKIT_ECOSYSTEM" ]; then
            cmd+=(--ecosystem "$RELEASEKIT_ECOSYSTEM")
          fi
        fi

        # ── rollback-specific flags ─────────────────────────────
        if [ "$RELEASEKIT_COMMAND" = "rollback" ]; then
          if [ -n "$RELEASEKIT_TAG" ]; then
            cmd+=(--tag "$RELEASEKIT_TAG")
          fi
          if [ "$RELEASEKIT_ALL_TAGS" = "true" ]; then
            cmd+=(--all-tags)
          fi
          if [ "$RELEASEKIT_YANK" = "true" ]; then
            cmd+=(--yank)
          fi
          if [ -n "$RELEASEKIT_YANK_REASON" ]; then
            cmd+=(--yank-reason "$RELEASEKIT_YANK_REASON")
          fi
        fi

        # ── Execute ───────────────────────────────────────────────
        echo "::group::Running: ${cmd[*]}"
        OUTPUT=$("${cmd[@]}" 2>&1) || EXIT_CODE=$?
        echo "$OUTPUT"
        echo "::endgroup::"

        if [ "${EXIT_CODE:-0}" -ne 0 ]; then
          echo "::error::releasekit $RELEASEKIT_COMMAND failed with exit code $EXIT_CODE"
          echo ""
          echo "────────────────────────────────────────"
          echo "Last 50 lines of output (for diagnosis):"
          echo "────────────────────────────────────────"
          echo "$OUTPUT" | tail -50
          echo "────────────────────────────────────────"
          exit "$EXIT_CODE"
        fi

        # ── Parse outputs ─────────────────────────────────────────
        # SECURITY: Use heredoc delimiters to prevent output injection.
        # Raw "key=value" format is vulnerable if the value contains
        # newlines — an attacker could inject additional output keys.
        # Heredoc format: key<<DELIMITER\nvalue\nDELIMITER
        if [ "$RELEASEKIT_COMMAND" = "prepare" ]; then
          PR_URL=$(echo "$OUTPUT" | sed -n 's/.*Release PR: //p' | tail -1)
          if [ -n "$PR_URL" ]; then
            echo "has_bumps=true" >> "$GITHUB_OUTPUT"
            {
              echo "pr_url<<RELEASEKIT_EOF"
              echo "$PR_URL"
              echo "RELEASEKIT_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "has_bumps=false" >> "$GITHUB_OUTPUT"
          fi
        fi

        if [ "$RELEASEKIT_COMMAND" = "release" ]; then
          RELEASE_URL=$(echo "$OUTPUT" | sed -n 's/.*release_url=//p' | tail -1)
          if [ -n "$RELEASE_URL" ]; then
            {
              echo "release_url<<RELEASEKIT_EOF"
              echo "$RELEASE_URL"
              echo "RELEASEKIT_EOF"
            } >> "$GITHUB_OUTPUT"
          fi
        fi
