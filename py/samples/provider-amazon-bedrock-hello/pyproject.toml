[project]
authors = [
  { name = "Google" },
  { name = "Yesudeep Mangalapilly", email = "yesudeep@google.com" },
  { name = "Elisa Shen", email = "mengqin@google.com" },
  { name = "Niraj Nepal", email = "nnepal@google.com" },
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Environment :: Console",
  "Environment :: Web Environment",
  "Intended Audience :: Developers",
  "Operating System :: OS Independent",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Private :: Do Not Upload",
]
dependencies = [
  "rich>=13.0.0",
  "genkit",
  "genkit-plugin-amazon-bedrock",
  "pydantic>=2.0.0",
  "structlog>=24.0.0",
  "uvloop>=0.21.0",
]
description = "Amazon Bedrock Hello Sample"
license = "Apache-2.0"
name = "provider-amazon-bedrock-hello"
requires-python = ">=3.10"
version = "0.2.0"

[project.optional-dependencies]
dev = ["watchdog>=6.0.0"]

[tool.uv.sources]
genkit-plugin-amazon-bedrock = { workspace = true }

[build-system]
build-backend = "hatchling.build"
requires      = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["src"]
