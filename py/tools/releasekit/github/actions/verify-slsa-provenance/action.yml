# ══════════════════════════════════════════════════════════════════════
# Reusable composite action: Verify SLSA provenance (L3)
#
# Downloads the SLSA provenance artifact generated by
# slsa-github-generator, installs slsa-verifier, and validates
# that the provenance is authentic and matches the source repo.
#
# Security:
#   - No secrets required
#   - Downloads only from GitHub's artifact store
#   - slsa-verifier pinned to commit SHA
#   - Verification failure is non-blocking (warning only) to
#     avoid breaking the pipeline on transient issues
#
# References:
#   - SLSA Build L3 spec:    https://slsa.dev/spec/v1.0/levels#build-l3
#   - SLSA verification:     https://slsa.dev/spec/v1.0/verifying-artifacts
#   - slsa-verifier:         https://github.com/slsa-framework/slsa-verifier
#   - slsa-github-generator: https://github.com/slsa-framework/slsa-github-generator
#   - in-toto attestation:   https://in-toto.io/
#   - Sigstore transparency: https://www.sigstore.dev/
#
# Usage (Python / uv):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#       artifact-pattern: |
#         *.whl
#         *.tar.gz
#
# Usage (JavaScript / pnpm):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#       artifact-pattern: "*.tgz"
#
# Usage (Java / Gradle):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#       artifact-pattern: |
#         *.jar
#         *.aar
#
# Usage (Go):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#
# Usage (Rust / Cargo):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#       artifact-pattern: "*.crate"
#
# Usage (Dart / pub.dev):
#
#   - uses: ./.github/actions/verify-slsa-provenance
#     with:
#       provenance-name: ${{ needs.provenance.outputs.provenance-name }}
#       provenance-available: ${{ needs.provenance.result == 'success' && 'true' || 'false' }}
#
# ══════════════════════════════════════════════════════════════════════

name: Verify SLSA Provenance
description: >-
  Download and verify SLSA L3 provenance using slsa-verifier.

inputs:
  provenance-name:
    description: >-
      Name of the provenance artifact to download (from
      slsa-github-generator outputs).
    required: true
  provenance-available:
    description: >-
      Set to "true" if the provenance job succeeded. Verification
      is skipped if "false".
    required: false
    default: "true"
  artifact-pattern:
    description: >-
      Newline-separated list of filename glob patterns for artifacts
      to verify. Each line is a separate pattern (e.g. "*.whl" and
      "*.tar.gz" on separate lines for Python). Defaults to "*"
      (all non-provenance files in the provenance directory).
    required: false
    default: "*"

runs:
  using: composite
  steps:
    - name: Download SLSA provenance
      if: inputs.provenance-available == 'true'
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
      with:
        name: ${{ inputs.provenance-name }}
        path: provenance

    - name: Install slsa-verifier
      if: inputs.provenance-available == 'true'
      uses: slsa-framework/slsa-verifier/actions/installer@6657aada084353c65e5dde35394b1a010289fab0  # v2.7.0

    - name: Verify SLSA provenance
      if: inputs.provenance-available == 'true'
      shell: bash
      env:
        ARTIFACT_PATTERN: ${{ inputs.artifact-pattern }}
      run: |
        set -euo pipefail
        echo "::group::SLSA provenance verification"
        PROVENANCE_FILE=$(find provenance/ -name '*.intoto.jsonl' | head -1)
        if [ -z "$PROVENANCE_FILE" ]; then
          echo "::warning::No SLSA provenance file found, skipping verification"
          echo "::endgroup::"
          exit 0
        fi

        # Build list of artifact files to verify (excluding provenance).
        ARTIFACTS=()
        while IFS= read -r pattern; do
          if [ -z "$pattern" ]; then
            continue
          fi
          while IFS= read -r -d '' f; do
            ARTIFACTS+=("$f")
          done < <(find provenance/ -name "$pattern" ! -name '*.intoto.jsonl' -print0)
        done <<< "$ARTIFACT_PATTERN"

        if [ ${#ARTIFACTS[@]} -eq 0 ]; then
          echo "::warning::No artifact files found for verification"
          echo "::endgroup::"
          exit 0
        fi

        echo "Verifying provenance: $PROVENANCE_FILE"
        echo "Source: github.com/${{ github.repository }}"
        echo "Artifacts: ${ARTIFACTS[*]}"
        slsa-verifier verify-artifact \
          --provenance-path "$PROVENANCE_FILE" \
          --source-uri "github.com/${{ github.repository }}" \
          "${ARTIFACTS[@]}" 2>&1 || {
            echo "::warning::SLSA provenance verification failed (non-blocking)"
          }
        echo "::endgroup::"
