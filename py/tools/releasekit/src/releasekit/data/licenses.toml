# License registry for releasekit's license compatibility checker.
#
# Each top-level key is a canonical SPDX identifier (the graph node key).
# Fields:
#   name            — Human-readable full name.
#   category        — One of: permissive, weak-copyleft, strong-copyleft,
#                     network-copyleft, source-available, proprietary.
#   google_category — Google licenseclassifier category. One of:
#                     restricted, reciprocal, notice, permissive,
#                     unencumbered, by_exception_only, forbidden.
#                     See: github.com/google/licenseclassifier
#   osi_approved    — Whether the OSI has approved this license.
#   aliases         — Case-insensitive strings that resolve to this SPDX ID.
#   patent_grant    — (optional, default false) Whether this license contains
#                     an explicit patent grant clause.
#   patent_retaliation — (optional, default false) Whether this license
#                     terminates rights upon patent litigation.
#
# Sources:
#   - SPDX License List:        https://spdx.org/licenses/
#   - GNU license list:         https://www.gnu.org/licenses/license-list.html
#   - OSI approved list:        https://opensource.org/licenses/
#   - Google licenseclassifier: https://github.com/google/licenseclassifier
#
# SPDX-License-Identifier: Apache-2.0

